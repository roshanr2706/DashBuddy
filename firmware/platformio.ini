; ============================================================================
;  Dash Companion — firmware build config
;  Board: ESP32-S3-N16R8 (16 MB flash, 8 MB octal PSRAM)
;  See ../dash-companion-build-plan.md for the full design.
; ============================================================================

[platformio]
default_envs = dashbuddy
; LittleFS is the on-device filesystem for per-drive summaries (§6).
; The image is built from firmware/data/ if that dir exists.

[env:dashbuddy]
; Pinned to the 6.x platform (arduino-esp32 core 2.0.x) — the LEDC (ledcSetup/
; ledcAttachPin) and LittleFS APIs used in this firmware match that core. The
; 3.x core (IDF5) changed the LEDC API; bump deliberately if you migrate.
platform  = espressif32@^6.9.0
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed  = 921600
build_src_filter = +<*> -<display_self_test.cpp>

; --- Secrets ---------------------------------------------------------------
; Injects WiFi/keys from the gitignored firmware/.env at build time as CFG_*
; defines (see scripts/load_env.py). Keeps secrets OUT of tracked source.
extra_scripts = pre:scripts/load_env.py

; --- Board memory: N16R8 = 16 MB flash + 8 MB OCTAL (OPI) PSRAM ------------
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.flash_mode          = qio
board_build.psram_type          = opi

; --- Filesystem ------------------------------------------------------------
; 16 MB flash: dual-OTA app partitions + a LittleFS data partition.
board_build.partitions      = default_16MB.csv
board_build.filesystem      = littlefs

; --- Libraries (pinned) ----------------------------------------------------
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit VEML7700 Library@^2.1.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.1.0

; --- Build flags -----------------------------------------------------------
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DUSE_HSPI_PORT=1

    ; ---- TFT_eSPI configuration (replaces editing User_Setup.h) ----
    ; Panel: ST7735 1.44" 128x128. GREENTAB3 enables the 128x128 RAM
    ; offsets used by many 1.44" modules so the image is not shifted.
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=128
    -DST7735_GREENTAB3=1
    -DTFT_RGB_ORDER=TFT_BGR
    ; SPI + control pins — must match config.h and the wiring table (§5).
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    ; Backlight is driven manually via LEDC (see Backlight.*), so TFT_BL is
    ; intentionally NOT handed to TFT_eSPI here.
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
    ; No touchscreen on this panel — silences TFT_eSPI's TOUCH_CS warning.
    -DDISABLE_ALL_LIBRARY_WARNINGS=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=16000000

[env:displaytest]
extends = env:dashbuddy
; Standalone I2C/MPU6050 diagnostic. Scans the bus, accepts 0x68 or 0x69,
; displays live readings on the TFT, and prints detailed values over serial.
build_src_filter = +<display_self_test.cpp> +<MotionSensor.cpp>
